  allchecks:
    name: All Checks Passed
    permissions:
      checks: read
      contents: read
    needs: lint
    if: needs.check-commit.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: wechuli/allcheckspassed@v2
        with:
          poll: false
          checks_exclude: 'generate'
