name:  Lint, Test, and Build (main PR/push)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

jobs:

  # Check if this is a PR commit to main and skip if so
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_ignore: |
            aboutlibraries.json

      - name: Check if should run
        id: check
        run: |
          IS_AUTO_COMMIT=false
          if [ "${{ github.event_name }}" = "push" ] && \
             [ "${{ github.event.head_commit.committer.name }}" = "GitHub" ]; then
            IS_AUTO_COMMIT=true
          fi
          
          OTHER_FILES_CHANGED="${{ steps.changed-files.outputs.any_changed }}"
          
          if [ "$IS_AUTO_COMMIT" = "false" ] && [ "$OTHER_FILES_CHANGED" = "true" ]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "Decision: Running workflow"
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "Decision: Skipping workflow"
            echo "Reasoning:"
            echo "  - Is automated push: $IS_AUTO_COMMIT"
            echo "  - Other files changed: $OTHER_FILES_CHANGED"
          fi

  lint:
    needs: check-commit
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/lint.yml

  static-code-analysis:
    needs: check-commit
    if: needs.check-commit.outputs.should-run == 'true'
    uses: SorrowBlue/github-actions/.github/workflows/analysis.yml@main
    with:
      analysis-matrix: >
        [
          {
            "task": "reportMerge --continue",
            "sarif_file": "build/reports/detekt/merge.sarif",
            "category": "detekt"
          },
          {
            "task": ":build-logic:detektMain",
            "sarif_file": "build-logic/build/reports/detekt/main.sarif",
            "category": "detekt"
          },
          {
            "task": "checkVersionCatalog"
          }
        ]

  test-unit:
    needs: check-commit
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/test-unit.yml

  test-instrumentation:
    needs: check-commit
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/test-instrumentation.yml

  build:
    needs: [ lint, static-code-analysis, test-unit, test-instrumentation ]
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/build.yml
    with:
      environment: android
    secrets: inherit

  allchecks:
    name: All Checks Passed
    permissions:
      checks: read
      contents: read
    needs: build
    if: needs.check-commit.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: wechuli/allcheckspassed@v2
        with:
          poll: false
          checks_exclude: 'generate'
