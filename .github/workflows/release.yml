name: Release

on:
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write
  checks: write
  id-token: write
  security-events: write

jobs:
  lint:
    uses: SorrowBlue/github-actions/.github/workflows/analyze-matrix.yml@main
    with:
      matrix-json: '.github/lint-matrix.json'

  test:
    uses: ./.github/workflows/test.yml

  build-android-release:
    needs: [ lint, test ]
    uses: SorrowBlue/github-actions/.github/workflows/android-publish.yml@main
    secrets: inherit
    with:
      environment: android
      fetch-depth: 0
      task: bundleRelease
      package-name: com.sorrowblue.comicviewer
      release-files: app/android/build/outputs/bundle/release/android-release.aab
      tracks: ${{ contains(github.ref_name, 'beta') && 'beta' || 'production' }}
      status: draft
      mapping-file: app/android/build/outputs/mapping/release/mapping.txt
      debug-symbols: app/android/build/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib

  build-jvm-release:
    needs: [ lint, test ]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Ubuntu
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: Mac
    uses: SorrowBlue/github-actions/.github/workflows/jvm-build.yml@main
    with:
      runs-on: ${{ matrix.os }}
      name: ${{ matrix.name }}
      task: packageDistributionForCurrentOS
      output-name: jvm-${{ matrix.name }}
      output-path: app/jvm/build/compose/binaries/main/

  upload-release-assets:
    runs-on: ubuntu-latest
    needs: [ build-android-release, build-jvm-release ]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
      - name: Display structure of downloaded files
        run: ls -la ./artifacts/**
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release'
        with:
          files: |
            ./artifacts/jvm-Ubuntu/deb/*
            ./artifacts/jvm-Windows/msi/*
            ./artifacts/jvm-Mac/dmg/*
      - name: Notify Discord - Release Success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          title: ":rocket: Release ${{ github.ref_name }} published!"
          description: |
            :white_check_mark: All quality checks passed
            :package: Release artifacts uploaded to GitHub
            :iphone: Android AAB uploaded to Play Console
            :jvm: JVM apps built for Windows, macOS, Linux

            **GitHub Release**:
              [View release](${{ github.event.release.html_url }})
          color: 0x00ff00
      - name: Notify Discord - Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          title: ":x: Release ${{ github.ref_name }} failed"
          description: |
            The release process encountered an error. Please check the
            workflow logs.

            **Workflow**:
              [View logs](${{ github.server_url }}/${{
                github.repository }}/actions/runs/${{ github.run_id }})
          color: 0xff0000
